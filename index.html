<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的恋爱抽卡机 💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #fdf2f8; 
            background-image: radial-gradient(#fbcfe8 1px, transparent 1px);
            background-size: 20px 20px;
            overflow-x: hidden;
        }

        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-transition { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            10% { opacity: 1; transform: translate(-50%, 0); }
            90% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }
        .toast-animate { animation: slideUpFade 3s forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center py-10 px-4">
    
    <!-- Identity Modal -->
    <div id="identityModal" class="fixed inset-0 bg-pink-50/90 z-50 flex items-center justify-center transition-opacity duration-300 hidden">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full mx-4 text-center shadow-2xl border-2 border-rose-100">
            <h2 class="text-2xl font-bold text-rose-500 mb-2">💖 确认身份 💖</h2>
            <p class="text-gray-500 text-sm mb-8">请选择你的专属身份<br>文案会自动生成发给对方的专属称呼哦~</p>
            <div class="flex gap-4 justify-center">
                <button onclick="setIdentity('哼哼')" class="w-28 py-3 bg-rose-50 text-rose-600 font-bold rounded-full hover:bg-rose-100 transition shadow-sm border border-rose-100">我是 哼哼</button>
                <button onclick="setIdentity('亲亲')" class="w-28 py-3 bg-rose-50 text-rose-600 font-bold rounded-full hover:bg-rose-100 transition shadow-sm border border-rose-100">我是 亲亲</button>
            </div>
        </div>
    </div>

    <header class="text-center mb-8 max-w-md animate-float">
        <h1 class="text-3xl md:text-4xl font-bold text-rose-500 mb-2 drop-shadow-sm">
            💌 我们的心动盲盒
        </h1>
        <p class="text-rose-400 text-sm md:text-base">
            不知道聊什么？点击抽卡，解锁今天的专属任务！
        </p>
    </header>

    <main class="w-full max-w-sm flex flex-col items-center">
        <!-- Card Container -->
        <div class="relative w-72 h-96 cursor-pointer perspective-1000 group" id="cardContainer" onclick="drawCard()">
            <div id="cardInner" class="w-full h-full relative transform-style-3d card-transition shadow-xl rounded-2xl">
                
                <!-- Front of Card (Cover) -->
                <div class="absolute w-full h-full bg-gradient-to-br from-rose-300 to-pink-400 rounded-2xl backface-hidden flex flex-col items-center justify-center border-4 border-white border-opacity-50">
                    <div class="text-6xl mb-4">🎁</div>
                    <h2 class="text-white text-2xl font-bold tracking-widest">点击抽取</h2>
                    <p class="text-pink-100 text-sm mt-2">365件恋爱小事</p>
                </div>

                <!-- Back of Card (Result) -->
                <div class="absolute w-full h-full bg-white rounded-2xl backface-hidden rotate-y-180 flex flex-col items-center justify-between p-6 border-4 border-rose-200">
                    <div class="text-center w-full">
                        <span id="cardCategory" class="inline-block px-3 py-1 bg-rose-100 text-rose-600 rounded-full text-xs font-bold mb-4">
                            类别
                        </span>
                        <div id="cardEmoji" class="text-5xl mb-4 mt-2">✨</div>
                    </div>
                    
                    <div class="flex-grow flex items-center justify-center">
                        <p id="cardText" class="text-gray-700 text-lg font-medium text-center leading-relaxed">
                            任务内容将在这里显示...
                        </p>
                    </div>

                    <div class="text-gray-400 text-xs mt-4" id="cardNumber">#000</div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="mt-8 flex flex-col items-center gap-4 opacity-0 pointer-events-none transition-opacity duration-500" id="actionButtons">
            <button onclick="copyTask()" class="px-8 py-3 bg-gradient-to-r from-rose-400 to-pink-500 text-white font-bold rounded-full shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all flex items-center justify-center w-full max-w-xs">
                <span id="copyBtnText">复制发送 💬</span>
            </button>
            <p class="text-rose-400 text-xs text-center mt-2">✨ 今日任务已抽取，双方进度已实时同步云端 ✨</p>
        </div>
        
        <!-- Partner's Task Area -->
        <div id="partnerStatusArea" class="mt-6 w-full max-w-xs bg-white rounded-2xl p-4 shadow-sm border-2 border-rose-100 hidden opacity-0 transition-opacity duration-500">
            <h3 class="text-sm font-bold text-rose-500 mb-2 flex items-center justify-center gap-2">
                <span>💞</span> <span id="partnerTitle">对方的任务</span>
            </h3>
            <div id="partnerTaskContent" class="text-center text-gray-600 text-sm bg-rose-50 rounded-xl p-3">
                <span class="animate-pulse">正在悄悄看TA抽了什么... 👀</span>
            </div>
        </div>
        
        <button onclick="switchIdentity()" class="mt-12 text-gray-400 text-xs underline hover:text-rose-400 transition-colors">
            切换身份 (当前: <span id="currentIdentityLabel">-</span>)
        </button>
    </main>

    <!-- Custom Toast Message -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg text-sm font-medium hidden z-50">
        提示信息
    </div>
    <input type="text" id="clipboardInput" class="hidden absolute -left-9999">

    <script>
        // ==========================================
        // ⚠️【必填】GitHub 仓库配置区 (匹配你的截图)
        // ==========================================
        const GITHUB_TOKEN = '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'; // 这里填入你的 Personal Access Token
        const OWNER_REPO = '878481881-jpg/loveplan'; // 这里填入仓库名称 (Owner/Repo)
        const FILE_PATH = 'data.json'; // 这里填入存储文件路径
        // ==========================================

        const tasks = [
            // 请把你完整的 tasks 数组复制粘贴到这里！
            { id: 1, category: "日常分享", emoji: "☀️", text: "互道专属的“早安”和“晚安”，让对方成为一天开头和结尾的人。" },
            { id: 2, category: "趣味游戏", emoji: "🎨", text: "玩“你画我猜”（用手机自带画图工具画完发图片，让对方猜）。" },
            { id: 3, category: "云约会", emoji: "🍿", text: "约定同一时间看同一部电影，边看边用文字疯狂吐槽剧情。" },
            { id: 4, category: "深度沟通", emoji: "❤️‍🩹", text: "坦诚地聊一次：第一次谈恋爱，你内心最害怕或担心什么？" },
            { id: 5, category: "真实触感", emoji: "🎙️", text: "尝试在早晨发一条3秒钟的短语音说“早安”。" },
            { id: 6, category: "奇思妙想", emoji: "👑", text: "今天你是“国王/女王”，可以无条件要求对方做一件不过分的小事。" }
        ];

        let isFlipped = false;
        let currentTaskText = "";
        let isAnimating = false;
        let myIdentity = "";
        let partnerIdentity = "";
        let currentFileSha = null; // 用于记录 GitHub 文件的 SHA 值以供更新使用
        
        // 修复：获取本地时区（如北京时间）的当前日期，确保每天零点准时刷新，严格限制每天只能抽一次
        const todayStr = new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];
        let pollInterval = null;

        window.onload = function() {
            myIdentity = localStorage.getItem('loveGacha_myIdentity');
            
            if (!myIdentity) {
                document.getElementById('identityModal').classList.remove('hidden');
            } else {
                updateIdentityUI();
                startPolling();
            }
        };

        function setIdentity(id) {
            myIdentity = id;
            localStorage.setItem('loveGacha_myIdentity', id);
            updateIdentityUI();
            document.getElementById('identityModal').classList.add('hidden');
            startPolling();
        }

        function switchIdentity() {
            document.getElementById('identityModal').classList.remove('hidden');
        }

        function updateIdentityUI() {
            partnerIdentity = (myIdentity === '哼哼') ? '亲亲' : '哼哼';
            document.getElementById('currentIdentityLabel').innerText = myIdentity;
            document.getElementById('copyBtnText').innerText = `复制发给${partnerIdentity} 💬`;
        }

        // ==========================================
        // 核心：GitHub Repository 读写逻辑
        // ==========================================

        // 读取云端仓库数据
        async function fetchRepoData() {
            if (!GITHUB_TOKEN || GITHUB_TOKEN.includes('ghp_xxxxxx')) return null;
            
            try {
                const response = await fetch(`https://api.github.com/repos/${OWNER_REPO}/contents/${FILE_PATH}`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Authorization': `Bearer ${GITHUB_TOKEN}`,
                        'Cache-Control': 'no-cache'
                    }
                });
                
                if (response.status === 404) return {}; // 如果文件还不存在，返回空对象
                
                const data = await response.json();
                currentFileSha = data.sha; // 记录 sha，下次写入时需要
                
                // GitHub 返回的是 Base64 编码，需解码并处理中文
                const content = decodeURIComponent(escape(atob(data.content)));
                return JSON.parse(content || '{}');
            } catch (error) {
                console.error("读取数据失败:", error);
                return null;
            }
        }

        // 写入数据到云端仓库
        async function updateRepoData(newData) {
            if (!GITHUB_TOKEN || GITHUB_TOKEN.includes('ghp_xxxxxx')) {
                showToast("未配置有效的 GitHub Token，仅保存到本地哦");
                return;
            }

            try {
                const contentStr = JSON.stringify(newData, null, 2);
                // 处理中文转 Base64
                const encodedContent = btoa(unescape(encodeURIComponent(contentStr)));
                
                const response = await fetch(`https://api.github.com/repos/${OWNER_REPO}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Authorization': `Bearer ${GITHUB_TOKEN}`
                    },
                    body: JSON.stringify({
                        message: `Update gacha data for ${todayStr}`,
                        content: encodedContent,
                        sha: currentFileSha
                    })
                });
                
                const result = await response.json();
                if (result.content && result.content.sha) {
                    currentFileSha = result.content.sha; // 更新 sha
                }
                console.log("云端同步成功！");
            } catch (error) {
                console.error("写入数据失败:", error);
            }
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            checkDataAndRender();
            pollInterval = setInterval(checkDataAndRender, 5000);
        }

        async function checkDataAndRender() {
            const allData = await fetchRepoData();
            if (!allData) return;

            const todayData = allData[todayStr] || {};

            if (todayData[myIdentity] && !isFlipped) {
                renderFlippedCard(todayData[myIdentity], false);
            }

            updatePartnerUI(todayData[partnerIdentity]);
        }

        function updatePartnerUI(partnerTask) {
            const partnerArea = document.getElementById('partnerStatusArea');
            const partnerTitle = document.getElementById('partnerTitle');
            const partnerContent = document.getElementById('partnerTaskContent');
            
            partnerArea.classList.remove('hidden');
            partnerArea.classList.remove('opacity-0');
            partnerTitle.innerText = `${partnerIdentity} 的任务`;
            
            if (partnerTask) {
                // 美化对方任务的展示UI，更清晰地显示云端同步过来的内容
                partnerContent.innerHTML = `
                    <div class="flex flex-col items-center justify-center p-2">
                        <span class="text-3xl mb-2">${partnerTask.emoji}</span>
                        <span class="text-xs font-bold text-rose-400 mb-1">【${partnerTask.category}】</span>
                        <span class="font-medium text-gray-700 leading-snug">${partnerTask.text}</span>
                    </div>`;
                partnerContent.classList.remove('animate-pulse', 'text-gray-600');
            } else {
                partnerContent.innerHTML = `<span class="animate-pulse block py-3 text-gray-500">TA今天还没有抽卡哦，快去提醒TA吧~ 👀</span>`;
            }
        }

        async function drawCard() {
            if (isAnimating || isFlipped) {
                if (isFlipped && myIdentity) showToast("今天已经抽过啦，明天再来哦~");
                return; 
            }
            if (!myIdentity) {
                showToast("请先选择身份哦！");
                document.getElementById('identityModal').classList.remove('hidden');
                return;
            }

            isAnimating = true;
            showToast("正在生成并同步任务...");

            // 1. 获取最新云端数据，防止双端同时操作导致的覆盖
            const allData = await fetchRepoData() || {};
            
            // 2. 严格的每日一次校验：如果云端已经有我的数据（可能你在另一台手机抽过），则拦截并直接显示云端数据
            if (allData[todayStr] && allData[todayStr][myIdentity]) {
                showToast("你在其他设备已经抽过啦，已为你同步今日任务！");
                renderFlippedCard(allData[todayStr][myIdentity], false);
                isAnimating = false;
                return;
            }

            // 3. 随机抽卡
            const randomIndex = Math.floor(Math.random() * tasks.length);
            const task = tasks[randomIndex];
            
            if (!allData[todayStr]) {
                allData[todayStr] = {};
            }
            
            // 把我的新任务塞进去
            allData[todayStr][myIdentity] = task;
            
            // 4. 更新回 GitHub 云端
            await updateRepoData(allData);
            
            // 5. 翻转卡片
            renderFlippedCard(task, true);
        }

        function renderFlippedCard(task, animate) {
            currentTaskText = task.text; 

            document.getElementById('cardCategory').innerText = task.category;
            document.getElementById('cardEmoji').innerText = task.emoji;
            document.getElementById('cardText').innerText = task.text;
            document.getElementById('cardNumber').innerText = `#${task.id.toString().padStart(3, '0')}`;

            const cardInner = document.getElementById('cardInner');
            
            if (animate) {
                cardInner.classList.add('rotate-y-180');
                isFlipped = true;
                setTimeout(() => {
                    const actions = document.getElementById('actionButtons');
                    actions.classList.remove('opacity-0');
                    actions.classList.remove('pointer-events-none');
                    isAnimating = false;
                }, 600);
            } else {
                cardInner.style.transition = 'none';
                cardInner.classList.add('rotate-y-180');
                isFlipped = true;
                void cardInner.offsetWidth; 
                cardInner.style.transition = ''; 
                
                const actions = document.getElementById('actionButtons');
                actions.classList.remove('opacity-0');
                actions.classList.remove('pointer-events-none');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.remove('hidden');
            toast.classList.add('toast-animate');
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('toast-animate');
            }, 3000);
        }

        function copyTask() {
            const textToCopy = `【今日心动任务】\n${currentTaskText}\n\n—— ${partnerIdentity}，这是我们今天要一起做的事哦！`;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    showToast("复制成功！快去发给他吧~");
                }).catch(() => fallbackCopyTextToClipboard(textToCopy));
            } else {
                fallbackCopyTextToClipboard(textToCopy);
            }
        }

        function fallbackCopyTextToClipboard(text) {
            const input = document.getElementById('clipboardInput');
            input.value = text;
            input.classList.remove('hidden');
            input.select();
            input.setSelectionRange(0, 99999);
            try {
                document.execCommand('copy');
                showToast("复制成功！快去发给他吧~");
            } catch (err) {
                showToast("复制失败，请手动截图~");
            }
            input.classList.add('hidden');
        }
    </script>
</body>
</html>
