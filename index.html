<html lang="zh-CN">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #fdf2f8; /* Tailwind pink-50 */
            background-image: radial-gradient(#fbcfe8 1px, transparent 1px);
            background-size: 20px 20px;
            overflow-x: hidden;
        }

        /* Card Flip Animation */
        .perspective-1000 {
            perspective: 1000px;
        }
        .transform-style-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        .card-transition {
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        /* Toast Animation */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            10% { opacity: 1; transform: translate(-50%, 0); }
            90% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }
        .toast-animate {
            animation: slideUpFade 3s forwards;
        }
    </style>
</head>

                    <h2 class="text-white text-2xl font-bold tracking-widest">点击抽取</h2>
                    <p class="text-pink-100 text-sm mt-2">100件恋爱小事</p>
                </div>

                <!-- Back of Card (Result) -->

                        </p>
                    </div>

                    <div class="text-gray-400 text-xs mt-4" id="cardNumber">#000</div>
                </div>
            </div>
        </div>

        <!-- Actions -->

            </button>
            <p class="text-rose-400 text-xs text-center mt-2">今日任务已抽取，明天再来哦~</p>
        </div>
        
        <button onclick="switchIdentity()" class="mt-12 text-gray-400 text-xs underline hover:text-rose-400 transition-colors">

        </button>

            { id: 92, category: "真实触感", emoji: "🎶", text: "互加音乐App的好友，查看对方平时的听歌动态。" },
            { id: 93, category: "真实触感", emoji: "🥤", text: "给对方点一次惊喜外卖（如奶茶，前提是愿意分享地址）。" },
            { id: 94, category: "真实触感", emoji: "📱", text: "做好心理准备后，尝试一次短暂的视频通话（可开特效）。" },
            { id: 95, category: "真实触感", emoji: "🎧", text: "语音通话时一起听一首歌，不说话，只感受对方的陪伴。" },
            { id: 96, category: "真实触感", emoji: "📻", text: "互相给对方朗读一段喜欢的文章发语音，假装电台主播。" },
            { id: 97, category: "真实触感", emoji: "🧸", text: "尝试在对方失眠的时候，打语音电话讲无聊的睡前故事。" },
            { id: 98, category: "真实触感", emoji: "🎁", text: "互送一份不贵重但很有心意的小礼物（如钥匙扣）。" },
            { id: 99, category: "真实触感", emoji: "🤝", text: "一起讨论如果未来能在现实中见面，第一件要做的事是什么。" },
            { id: 100, category: "真实触感", emoji: "💖", text: "勇敢地打字告诉他：“虽然我们都是第一次谈恋爱，但我很高兴遇到的是你。”" }
        ];

        let isFlipped = false;
        let currentTaskText = "";
        let isAnimating = false;
        
        let myIdentity = "";
        let partnerIdentity = "";
        const todayStr = new Date().toDateString(); // 获取本地当天的日期字符串

        // 网页加载时初始化
        window.onload = function() {
            myIdentity = localStorage.getItem('loveGacha_myIdentity');
            if (!myIdentity) {
                document.getElementById('identityModal').classList.remove('hidden');
            } else {
                updateIdentityUI();
                checkDailyLimit();
            }
        };

        // 设定身份
        function setIdentity(id) {
            myIdentity = id;
            localStorage.setItem('loveGacha_myIdentity', id);
            updateIdentityUI();
            document.getElementById('identityModal').classList.add('hidden');
            checkDailyLimit();
        }

        // 唤起切换身份弹窗
        function switchIdentity() {
            document.getElementById('identityModal').classList.remove('hidden');
        }

        // 更新UI上的身份文案
        function updateIdentityUI() {
            partnerIdentity = (myIdentity === '哼哼') ? '亲亲' : '哼哼';
            document.getElementById('currentIdentityLabel').innerText = myIdentity;
            document.getElementById('copyBtnText').innerText = `复制发给${partnerIdentity} 💬`;
        }

        // 检查今日是否已经抽过卡
        function checkDailyLimit() {
            const lastDrawDate = localStorage.getItem('loveGacha_lastDrawDate');
            if (lastDrawDate === todayStr) {
                // 如果今天抽过了，直接展示保存的卡片，不播放翻牌动画
                const savedTask = JSON.parse(localStorage.getItem('loveGacha_lastDrawnTask'));
                renderFlippedCard(savedTask, false);
            }
        }

        function drawCard() {
            if (isAnimating || isFlipped) {
                if (isFlipped && myIdentity) showToast("今天已经抽过啦，明天再来哦~");
                return; 
            }
            
            if (!myIdentity) {
                showToast("请先选择身份哦！");
                document.getElementById('identityModal').classList.remove('hidden');
                return;
            }

            isAnimating = true;

            // 随机抽取
            const randomIndex = Math.floor(Math.random() * tasks.length);
            const task = tasks[randomIndex];
            
            // 保存至本地存储，实现“一天一次”的限制
            localStorage.setItem('loveGacha_lastDrawDate', todayStr);
            localStorage.setItem('loveGacha_lastDrawnTask', JSON.stringify(task));

            renderFlippedCard(task, true);
        }

        function renderFlippedCard(task, animate) {
            currentTaskText = task.text; 

            // 更新DOM元素（卡片背面）
            document.getElementById('cardCategory').innerText = task.category;
            document.getElementById('cardEmoji').innerText = task.emoji;
            document.getElementById('cardText').innerText = task.text;
            document.getElementById('cardNumber').innerText = `#${task.id.toString().padStart(3, '0')}`;

            const cardInner = document.getElementById('cardInner');
            
            if (animate) {
                // 播放翻转动画
                cardInner.classList.add('rotate-y-180');
                isFlipped = true;

                // 动画结束后显示按钮
                setTimeout(() => {
                    const actions = document.getElementById('actionButtons');
                    actions.classList.remove('opacity-0');
                    actions.classList.remove('pointer-events-none'); // 启用按钮交互
                    isAnimating = false;
                }, 600);
            } else {
                // 瞬间展示（用于再次刷新网页时，直接显示今天的任务）
                cardInner.style.transition = 'none';
                cardInner.classList.add('rotate-y-180');
                isFlipped = true;
                
                // 触发页面重绘，使禁用过渡生效
                void cardInner.offsetWidth; 
                cardInner.style.transition = ''; // 恢复过渡效果
                
                const actions = document.getElementById('actionButtons');
                actions.classList.remove('opacity-0');
                actions.classList.remove('pointer-events-none');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.remove('hidden');
            toast.classList.add('toast-animate');
            
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('toast-animate');
            }, 3000);
        }

        function copyTask() {
            const textToCopy = `【今日心动任务】\n${currentTaskText}\n\n—— ${partnerIdentity}，这是我们今天要一起做的事哦！`;
            
            // Try modern clipboard API first
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    showToast("复制成功！快去发给他吧~");
                }).catch(() => {
                    fallbackCopyTextToClipboard(textToCopy);
                });
            } else {
                // Fallback for older browsers or iframes without clipboard permissions
                fallbackCopyTextToClipboard(textToCopy);
            }
        }

        function fallbackCopyTextToClipboard(text) {
            const input = document.getElementById('clipboardInput');
            input.value = text;
            input.classList.remove('hidden');
            input.select();
            input.setSelectionRange(0, 99999); /* For mobile devices */
            try {
                document.execCommand('copy');
                showToast("复制成功！快去发给他吧~");
            } catch (err) {
                showToast("复制失败，请手动截图~");
            }
            input.classList.add('hidden');
        }
    </script>
</body>
